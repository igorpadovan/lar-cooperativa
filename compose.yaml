services:
  postgres:
    image: postgres:18-alpine
    container_name: lar-cooperativa-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lar}
      POSTGRES_DB: ${POSTGRES_DB:-lar_cooperativa}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      # A partir do PostgreSQL 18, a imagem oficial monta /var/lib/postgresql (não mais /data)
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: dev
    container_name: lar-cooperativa-api
    ports:
      - "${API_HOST_PORT:-8081}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-lar_cooperativa};Username=${POSTGRES_USER:-lar};Password=${POSTGRES_PASSWORD:-lar}"
    volumes:
      - .:/app
      - nuget-cache:/root/.nuget/packages
    depends_on:
      postgres:
        condition: service_healthy

  # Executa a suíte de testes contra o banco <POSTGRES_DB>_test (docker compose --profile test run --rm tests)
  tests:
    profiles: ["test"]
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /app
    command: dotnet test
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-lar_cooperativa}_test;Username=${POSTGRES_USER:-lar};Password=${POSTGRES_PASSWORD:-lar}"
    volumes:
      - .:/app
      - nuget-cache:/root/.nuget/packages
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  nuget-cache:
